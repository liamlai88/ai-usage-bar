; AI Usage Bar — M5StickC Plus client
; Polls the Mac widget's HTTP server and renders 5h / 7d usage on the LCD.

[env:m5stick-c-plus]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

build_flags =
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    m5stack/M5StickCPlus@^0.1.0
    bblanchon/ArduinoJson@^7.2.0
